[graph]
targets = []
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    "RUSTSEC-2024-0436", # paste (transitive dep of simba) — unmaintained, no alternative in simba yet
]
# NOTE: RUSTSEC-2026-0097 (rand 0.8.5 unsoundness) reaches the graph only via
# the ad_trait DEV-dependency (comparison benches) and surfaces as an allowed
# "unsound" warning here; cargo-audit treats it as an error, so its justified
# ignore lives in .cargo/audit.toml. Remove there when ad_trait moves to rand 0.9.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
